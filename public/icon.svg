<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wave-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00185A"/>
      <stop offset="100%" stop-color="#0047AB"/>
    </linearGradient>
    <linearGradient id="wave-light" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0072FF"/>
      <stop offset="100%" stop-color="#00C6FF"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
  </defs>

  <!-- Deep Blue Wave -->
  <path d="M120 500 C 300 550, 420 300, 380 220 C 350 160, 200 400, 120 500 Z" fill="url(#wave-dark)"/>
  <!-- Light Blue Wave overlapping -->
  <path d="M100 480 C 250 480, 360 380, 440 460 C 380 500, 240 580, 100 480 Z" fill="url(#wave-light)"/>
  <!-- Bright Yellow/Orange Arrow shooting upwards -->
  <path d="M 380 400 L 600 180 L 550 140 L 700 100 L 660 250 L 620 200 L 400 420 Z" fill="url(#arrow)"/>
</svg>